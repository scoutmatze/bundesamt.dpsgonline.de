# Production Docker Compose with Traefik reverse proxy + Let's Encrypt SSL
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  traefik:
    image: traefik:v3.2
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
    restart: unless-stopped
    networks:
      - web

  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://dpsg:${DB_PASSWORD}@db:5432/dpsg_reisekosten
      - NEXTAUTH_URL=https://bundesamt.dpsgonline.de
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - PDF_GENERATOR_PATH=/app/pdf-generator
    volumes:
      - uploads:/app/uploads
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`bundesamt.dpsgonline.de`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web
      - internal

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=dpsg_reisekosten
      - POSTGRES_USER=dpsg
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dpsg -d dpsg_reisekosten"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

volumes:
  uploads:
  pgdata:
  traefik_certs:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
